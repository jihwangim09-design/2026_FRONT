<!DOCTYPE html>     <!-- HTML주석 --> <!-- HTML5 버전 알림 / 생략가능 -->
<html>  <!-- HTML 시작 -->
      <!-- HTML 언어 설정 / 생략가능  그래서 lang='en' 이거 필요 없음-->
<head>  <!-- HTML 헤더(옵션) 시작 -->
    <meta charset='utf-8'>  <!-- HTML 코드의 번역(인코딩)방법 : UTF-8 한글지원 -->
    <meta name='viewport' content='width=device-width, initial-scale=1'> <!-- 반응형 설정 -->
    <title>DAY02 EXAM2</title>   <!-- HTML 문서 제목(브라우저 탭 표시) -->
</head> <!-- HTML 헤더(옵션) 끝 -->
<body>  <!-- HTML 본문 시작 -->
    
    안녕하세요.
    <h1> 안녕하세요 </h1>  <!-- h1 ~ h6 : 제목 마크업 -->
    <h2> 안녕하세요 </h2>
    <h3> 안녕하세요 </h3>
    <h4> 안녕하세요 </h4>
    <h5> 안녕하세요 </h5>
    <h6> 안녕하세요 </h6>
    <h7> 안녕하세요 </h7>   <!-- h7 없는 마크업 : CSS직접꾸미기 -->

    문단1
    문단2
    <p> 문단1 </p>  <!-- p : 문단 마크엄 불편한 줄바꿈?-->
    <p> 문단2 </p>


    줄바꿈1<br /> 줄바꿈2<br />   <!-- br : 줄바꿈 -->

    <hr />         <!-- hr : 구분선 -->

    <span> 한칸1 </span>     <!-- span : 인라인 구역 한줄에 여러개 표현 h태그랑p태그는 인라인이 아님-->
    <span> 한칸2 </span>

    <div> 한칸3 </div>       <!-- div : 블럭 구역 : 추후에 레이아웃 작업 한줄을 다 차지 -->
    <div> 한칸4 </div>


    <ol>                    <!-- ol : 순서있는 목록 -->
        <li> 항목1 </li>     <!-- li : 항목 쇼핑몰에 제품의 정보를 출력할 때 순차적인 배치가 쉬워짐 순차적인배치 -->
        <li> 항목2 </li>
    </ol>

    <ul>                    <!-- ul : 순서없는 목록 글머리 차이 그냥 앞에 검은색 원(목차앞에 있는 특수문자) css로 수정가능-->
        <li> 항목1 </li> 
        <li> 항목2 </li> 
    </ul>

    <a href="https://naver.com"> 네이버 링크 </a>                <!-- a : 하이퍼링크 -->
    <a href="exam1.html"> 'exam1' HTML 이동 </a>
    <a href="tel:010-1234-1234"> 모바일에서 전화앱 </a>            <!-- a : pc는 안됨 핸드폰에서 실행하면 된다 -->

</body> <!-- HTML 본문 끝 -->
</html> <!-- HTML 끝 -->
